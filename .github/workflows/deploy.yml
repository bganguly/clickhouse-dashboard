name: Build and Push to ECR

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ch-dash-app
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"
          docker build -t "$REGISTRY/$REPOSITORY:latest" -t "$REGISTRY/$REPOSITORY:$SHORT_SHA" .
          docker push "$REGISTRY/$REPOSITORY:latest"
          docker push "$REGISTRY/$REPOSITORY:$SHORT_SHA"

      - name: Run ClickHouse migrations
        env:
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          npm install --prefer-offline || npm install
          npx tsx -e "import { runMigrations } from './lib/schema.ts'; runMigrations().then(() => process.exit(0)).catch(e => { console.error(e.message); process.exit(1); })"
